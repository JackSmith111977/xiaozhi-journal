<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; font-family: 'Noto Sans SC', sans-serif; background-color: #FDF8F5; color: #3D3D3D; }
    .wrapper { width: 100%; padding: 20px; background-color: #FDF8F5; }
    .container { max-width: 480px; margin: 0 auto; background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .header { text-align: center; padding: 32px 24px 24px; background: linear-gradient(135deg, #E8C4A0 0%, #D4856A 100%); }
    .header h1 { margin: 0; color: #ffffff; font-size: 24px; font-family: 'Noto Serif SC', serif; font-weight: 700; }
    .header p { margin: 8px 0 0; color: rgba(255,255,255,0.9); font-size: 14px; }
    .content { padding: 32px 24px; }
    .content p { line-height: 1.8; margin: 0 0 16px; font-size: 15px; }
    .btn-wrapper { text-align: center; padding: 8px 0 24px; }
    .btn { display: inline-block; background: #D4856A; color: #ffffff !important; padding: 14px 40px; border-radius: 12px; text-decoration: none; font-size: 16px; font-weight: 500; }
    .btn:hover { background: #c47558; }
    .note { background: #F5EDE4; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #8A817C; margin-top: 8px; }
    .footer { padding: 24px; border-top: 1px solid #F5EDE4; text-align: center; }
    .footer p { margin: 0; color: #6B635E; font-size: 12px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <h1>重置你的密码</h1>
        <p>小知 Journal — 你的温暖日记伙伴</p>
      </div>
      <div class="content">
        <p>你好，</p>
        <p>我们收到了重置密码的请求。如果这不是你本人的操作，请忽略此邮件，你的密码不会被修改。</p>
        <p>点击下方按钮设置新密码：</p>
        <div class="btn-wrapper">
          <a href="{{ .ConfirmationURL }}" class="btn">重置密码</a>
        </div>
        <div class="note">
          此链接有效期为 1 小时，超时后需要重新申请重置。
        </div>
      </div>
      <div class="footer">
        <p>小知 Journal — 每天记录一点温暖</p>
        <p>此邮件为系统自动发送，请勿直接回复。</p>
      </div>
    </div>
  </div>
</body>
</html>
